name: Release

on:
  pull_request:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  FOUNDRY_DRY_RUN: "false"

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate manifest
        shell: bash
        run: |
          set -euo pipefail

          MODULE_ID="$(jq -r '.id' module.json)"
          MODULE_VERSION="$(jq -r '.version' module.json)"

          if [[ -z "$MODULE_ID" || "$MODULE_ID" == "null" ]]; then
            echo "module.json must define an id."
            exit 1
          fi

          if [[ ! "$MODULE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "module.json version must be valid semver. Found: $MODULE_VERSION"
            exit 1
          fi

          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG_VERSION="${GITHUB_REF_NAME#v}"

            if [[ "$TAG_VERSION" != "$MODULE_VERSION" ]]; then
              echo "Tag $GITHUB_REF_NAME does not match module.json version $MODULE_VERSION."
              exit 1
            fi
          fi

          echo "MODULE_ID=$MODULE_ID" >> "$GITHUB_ENV"
          echo "MODULE_VERSION=$MODULE_VERSION" >> "$GITHUB_ENV"

      - name: Build release zip
        shell: bash
        run: |
          set -euo pipefail

          rm -rf dist
          mkdir -p "dist/$MODULE_ID"

          cp module.json README.md "dist/$MODULE_ID/"

          for path in packs assets scripts styles lang templates; do
            if [[ -e "$path" ]]; then
              cp -R "$path" "dist/$MODULE_ID/"
            fi
          done

          if [[ -f LICENSE ]]; then
            cp LICENSE "dist/$MODULE_ID/"
          fi

          (
            cd dist
            zip -r "${MODULE_ID}.zip" "$MODULE_ID"
          )

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            module.json
            dist/ordem-bestiario.zip

      - name: Publish release to Foundry VTT
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          FOUNDRY_RELEASE_TOKEN: ${{ secrets.FOUNDRY_RELEASE_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -z "${FOUNDRY_RELEASE_TOKEN:-}" ]]; then
            echo "FOUNDRY_RELEASE_TOKEN secret is not configured."
            exit 1
          fi

          if [[ "${FOUNDRY_DRY_RUN,,}" == "true" ]]; then
            DRY_RUN="true"
          else
            DRY_RUN="false"
          fi

          MINIMUM="$(jq -r '.compatibility.minimum // ""' module.json)"
          VERIFIED="$(jq -r '.compatibility.verified // ""' module.json)"
          MAXIMUM="$(jq -r '.compatibility.maximum // ""' module.json)"
          MANIFEST_URL="https://github.com/RodCas11/foundryvtt-ordem-bestiario-add-on/releases/download/${GITHUB_REF_NAME}/module.json"
          NOTES_URL="https://github.com/RodCas11/foundryvtt-ordem-bestiario-add-on/releases/tag/${GITHUB_REF_NAME}"

          jq -n \
            --arg id "$MODULE_ID" \
            --arg version "$MODULE_VERSION" \
            --arg manifest "$MANIFEST_URL" \
            --arg notes "$NOTES_URL" \
            --arg minimum "$MINIMUM" \
            --arg verified "$VERIFIED" \
            --arg maximum "$MAXIMUM" \
            --argjson dryRun "$DRY_RUN" \
            '{
              id: $id,
              "dry-run": $dryRun,
              release: {
                version: $version,
                manifest: $manifest,
                notes: $notes,
                compatibility: {
                  minimum: $minimum,
                  verified: $verified,
                  maximum: $maximum
                }
              }
            }' > foundry-release-payload.json

          HTTP_STATUS="$(
            curl --silent --show-error --output foundry-release-response.json --write-out "%{http_code}" \
              --request POST \
              --header "Content-Type: application/json" \
              --header "Authorization: ${FOUNDRY_RELEASE_TOKEN}" \
              --data @foundry-release-payload.json \
              https://foundryvtt.com/_api/packages/release_version/
          )"

          if [[ "$HTTP_STATUS" != "200" ]]; then
            echo "Foundry VTT Package Release API returned HTTP $HTTP_STATUS."
            cat foundry-release-response.json
            exit 1
          fi

          echo "Foundry VTT release registration succeeded for $MODULE_ID $MODULE_VERSION."
